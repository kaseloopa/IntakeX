<!DOCTYPE html>
<html>
<head>
  <title>IntakeX</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<h1>IntakeX</h1>

<div class="input-row">
  <input id="foodInput" placeholder="Food (e.g. cooked beef)" />
</div>

<div class="input-row">
  <input id="gramInput" type="number" placeholder="Amount" />
  <span class="grams-label">grams</span>
</div>

<button onclick="addFood()">Add</button>

<h2>Daily Logs</h2>

<!-- Tabs container -->
<div id="dayTabs"></div>

<!-- Daily totals -->
<p>Calories: <span id="calories">0</span></p>
<p>Protein: <span id="protein">0</span>g</p>

<!-- Food list for selected day -->
<ul id="foodList"></ul>

<script src="app.js?v=3"></script>
</body>
</html>
