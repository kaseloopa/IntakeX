<!DOCTYPE html>
<html>
<head>
  <title>IntakeX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>IntakeX</h1>

<div class="input-row">
  <input id="foodInput" placeholder="Food (e.g. waffles)" />
</div>

<div class="input-row">
  <input id="gramInput" type="number" placeholder="Amount" />
  <span class="grams-label">grams</span>
</div>

<button onclick="addFood()">Add</button>

<h2>Today</h2>
<p>Calories: <span id="calories">0</span></p>
<p>Protein: <span id="protein">0</span>g</p>

<ul id="foodList"></ul>

<script src="app.js"></script>
</body>
</html>
