<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntakeX</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>Daily Intake</h2>

    <!-- Tabs -->
    <div class="tab-header">
        <div class="active" onclick="showTab('daily')">Daily Log</div>
        <div onclick="showTab('vault')">Food Vault</div>
    </div>

    <!-- Daily Log Tab -->
    <div id="daily" class="tab-content">
        <!-- Input -->
        <div class="card">
            <div class="input-row">
                <input type="text" id="foodInput" placeholder="Food name">
                <input type="number" id="gramInput" placeholder="Grams">
            </div>
            <button class="add-btn" onclick="addFood()">Add</button>
        </div>

        <!-- Totals -->
        <div class="card totals">
            <h3>Daily Totals</h3>
            <p>🔥 Calories: <span id="calories">0</span></p>
            <p>🧩 Protein: <span id="protein">0</span>g</p>
        </div>

        <!-- Food Logs -->
        <div class="card">
            <h3>Food Logs</h3>
            <div class="logs-container">
                <!-- Dates column -->
                <div id="dayTabs" class="logs-dates"></div>

                <!-- Foods logged -->
                <ul id="foodList" class="logs-food"></ul>
            </div>
        </div>
    </div>

    <!-- Food Vault Tab -->
    <div id="vault" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Food Vault</h3>
            <div class="input-row">
                <input type="text" id="vaultFoodName" placeholder="Food name">
                <input type="number" id="vaultCalories" placeholder="Calories/100g">
                <input type="number" id="vaultProtein" placeholder="Protein/100g">
            </div>
            <button class="add-btn" onclick="addVaultFood()">Add</button>
        </div>
        <div class="card">
            <ul id="vaultList"></ul>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
