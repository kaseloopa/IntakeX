<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntakeX</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="container">
    <h2>IntakeX</h2>

    <!-- Tabs -->
    <div class="tab-header">
        <div id="dailyTab" class="active" onclick="showTab('daily')">Daily Log</div>
        <div id="vaultTab" onclick="showTab('vault')">Food Vault</div>
    </div>

    <!-- Daily Log Tab -->
    <div id="daily" class="tab-content">

    <!-- Input -->
    <div class="card">
        <div class="input-row">
            <input type="text" id="foodInput" placeholder="Food name">
            <input type="number" id="gramInput" placeholder="Grams">
            <button onclick="addFood()">Add</button>
        </div>
    </div>

    <!-- Totals -->
    <div class="card totals">
        <h3>Daily Totals</h3>
        <p>🔥 Calories: <span id="calories">0</span></p>
        <p>🧩 Protein: <span id="protein">0</span>g</p>
    </div>

    <!-- Logs -->
    <div class="card">
        <h3>Food Logs</h3>
        <div id="dayTabs"></div>
        <ul id="foodList"></ul>
    </div>

</div>

    <!-- Food Vault Tab -->
    <div id="vault" class="tab-content" style="display:none;">

    <div class="card">
        <h3>Food Vault</h3>

        <div class="input-row">
            <input type="text" id="vaultFoodName" placeholder="Food name">
            <input type="number" id="vaultCalories" placeholder="Calories/100g">
            <input type="number" id="vaultProtein" placeholder="Protein/100g">
            <button onclick="addVaultFood()">Add</button>
        </div>
    </div>

    <div class="card">
        <ul id="vaultList"></ul>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
