<!DOCTYPE html>
<html>
<head>
  <title>IntakeX</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<h1>IntakeX</h1>

<div class="input-container">
  <input id="foodInput" placeholder="Food (e.g., 93/7 cooked beef)" autocomplete="off" />
  <div id="suggestions" class="suggestions"></div>
</div>

<div class="input-container">
  <input id="gramInput" type="number" placeholder="Amount" />
  <span class="grams-label">grams</span>
</div>

<button onclick="addFood()">Add</button>

<h2>Daily Logs</h2>

<div id="dayTabs"></div>

<div class="totals">
  <p>Calories: <span id="calories">0</span></p>
  <p>Protein: <span id="protein">0</span>g</p>
</div>

<ul id="foodList"></ul>

<script src="app.js?v=4"></script>
</body>
</html>
